services:
  postgres:
    image: postgres:16-alpine
    container_name: travel-db
    environment:
      POSTGRES_USER: travel
      POSTGRES_PASSWORD: travel_dev_2026
      POSTGRES_DB: ai_travel
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U travel -d ai_travel"]
      interval: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: travel-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 5

  planner-api:
    build:
      context: ../services/planner-api
      dockerfile: Dockerfile
    container_name: planner-api
    environment:
      DATABASE_URL: postgresql+asyncpg://travel:travel_dev_2026@postgres:5432/ai_travel
      REDIS_URL: redis://redis:6379
      LLM_API_KEY: ${LLM_API_KEY:-sk-placeholder}
      LLM_BASE_URL: ${LLM_BASE_URL:-https://api.deepseek.com/v1}
      LLM_MODEL: ${LLM_MODEL:-deepseek-chat}
    ports:
      - "8001:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ../services/planner-api:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  pgdata:
